<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIMI美甲美睫</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'PingFang SC', sans-serif; }
        :root { --primary: #F2A8C2; --light: #FDF2F7; --dark: #5A5A5A; --border: #E8D1DA; }
        body { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; }
        .container { padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .app-title { font-size: 24px; color: var(--primary); font-weight: 300; }
        .shop-name { font-size: 14px; color: var(--dark); margin-top: 5px; }
        .section-title { font-size: 16px; margin: 20px 0 15px; color: var(--primary); font-weight: 500; }
        .function-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .function-btn { background: var(--light); border: 2px solid var(--primary); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .function-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(242,168,194,0.2); }
        .function-btn i { font-size: 28px; display: block; margin-bottom: 8px; }
        .function-btn .btn-title { font-size: 15px; font-weight: 500; }
        .stats-section { background: var(--light); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 600; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--dark); }
        footer { background: var(--light); border-top: 1px solid var(--border); padding: 10px 0; margin-top: auto; }
        .nav-tabs { display: flex; justify-content: space-around; list-style: none; }
        .nav-item { text-align: center; padding: 8px 15px; cursor: pointer; border-radius: 8px; }
        .nav-item.active { background: #fff; }
        .page-content { display: none; padding: 20px; }
        .page-content.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #fff; border-radius: 16px; width: 90%; max-width: 400px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-btn { font-size: 24px; cursor: pointer; background: none; border: none; }
        .service-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .service-item:hover { background: var(--light); }
        .service-item.selected { background: var(--light); border-radius: 8px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; margin: 5px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: var(--light); color: var(--dark); border: 1px solid var(--border); }
        .total-section { display: flex; justify-content: space-between; padding: 15px 0; border-top: 2px solid var(--border); font-weight: 600; }
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .member-card { background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 12px; padding: 15px; color: #fff; margin-bottom: 15px; }
        .recharge-package { background: var(--light); border: 2px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; margin: 5px; display: inline-block; width: 45%; }
        .recharge-package.selected { border-color: var(--primary); }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container" id="homePage">
        <header>
            <h1 class="app-title">ZIMI美甲美睫</h1>
            <div class="shop-name">收银台系统 v1.1.0</div>
        </header>
        
        <div class="section-title">核心功能</div>
        <div class="function-grid">
            <div class="function-btn" id="quickOrderBtn">
                <i>⚡</i>
                <div class="btn-title">快速开单</div>
            </div>
            <div class="function-btn" id="collectMoneyBtn">
                <i>💳</i>
                <div class="btn-title">收款</div>
            </div>
            <div class="function-btn" id="memberRechargeBtn">
                <i>👑</i>
                <div class="btn-title">会员充值</div>
            </div>
            <div class="function-btn" id="memberManageBtn">
                <i>👥</i>
                <div class="btn-title">会员管理</div>
            </div>
        </div>
        
        <div class="stats-section">
            <div class="section-title">今日数据</div>
            <div class="stats-grid">
                <div><div class="stat-value" id="todayOrders">0</div><div class="stat-label">订单</div></div>
                <div><div class="stat-value" id="todayIncome">¥0</div><div class="stat-label">收入</div></div>
                <div><div class="stat-value" id="todayRecharge">¥0</div><div class="stat-label">充值</div></div>
            </div>
        </div>
        
        <footer>
            <ul class="nav-tabs">
                <li class="nav-item active" data-tab="home">🏠<br>首页</li>
                <li class="nav-item" data-tab="orders">📋<br>订单</li>
                <li class="nav-item" data-tab="members">👑<br>会员</li>
                <li class="nav-item" data-tab="reports">📊<br>报表</li>
                <li class="nav-item" data-tab="settings">⚙️<br>设置</li>
            </ul>
        </footer>
    </div>
    
    <div class="page-content" id="ordersPage">
        <h2>订单列表</h2>
        <div id="ordersList"></div>
        <button class="btn btn-secondary" onclick="showPage('home')">返回</button>
    </div>
    
    <div class="page-content" id="membersPage">
        <h2>会员管理</h2>
        <button class="btn btn-primary" id="addMemberBtn">新增会员</button>
        <div id="memberList"></div>
        <button class="btn btn-secondary" onclick="showPage('home')">返回</button>
    </div>
    
    <div class="page-content" id="reportsPage">
        <h2>数据报表</h2>
        <div id="reportContent"></div>
        <button class="btn btn-secondary" onclick="showPage('home')">返回</button>
    </div>
    
    <div class="page-content" id="settingsPage">
        <h2>系统设置</h2>
        <p>版本: v1.1.0</p>
        <button class="btn btn-secondary" onclick="showPage('home')">返回</button>
    </div>
    
    <!-- 快速开单模态框 -->
    <div class="modal" id="quickOrderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>选择服务</h3>
                <button class="close-btn" onclick="closeModal('quickOrderModal')">&times;</button>
            </div>
            <div id="serviceList"></div>
            <div class="total-section">
                <span>总计:</span>
                <span id="orderTotal">¥0</span>
            </div>
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="clearSelection()">清空</button>
                <button class="btn btn-primary" onclick="confirmOrder()">确认</button>
            </div>
        </div>
    </div>
    
    <!-- 收款模态框 -->
    <div class="modal" id="collectMoneyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>收款</h3>
                <button class="close-btn" onclick="closeModal('collectMoneyModal')">&times;</button>
            </div>
            <div style="text-align: center; padding: 20px;">
                <div style="font-size: 32px; color: var(--primary); margin: 20px 0;" id="collectAmount">¥0</div>
                <button class="btn btn-primary" onclick="processPayment('cash')">现金支付</button>
                <button class="btn btn-primary" onclick="processPayment('wechat')">微信支付</button>
                <button class="btn btn-primary" onclick="processPayment('alipay')">支付宝</button>
                <button class="btn btn-primary" onclick="processPayment('member')">会员余额</button>
            </div>
        </div>
    </div>
    
    <!-- 会员充值模态框 -->
    <div class="modal" id="memberRechargeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>会员充值</h3>
                <button class="close-btn" onclick="closeModal('memberRechargeModal')">&times;</button>
            </div>
            <input type="text" id="searchPhone" placeholder="输入手机号搜索">
            <button class="btn btn-secondary" onclick="searchMember()">搜索</button>
            <div id="memberInfo" style="display: none;">
                <div class="member-card">
                    <div id="memberName">-</div>
                    <div>余额: ¥<span id="memberBalance">0</span></div>
                </div>
                <div class="recharge-package" data-amount="100" onclick="selectRecharge(100, 0)">¥100</div>
                <div class="recharge-package" data-amount="200" onclick="selectRecharge(200, 20)">¥200 送¥20</div>
                <div class="recharge-package" data-amount="500" onclick="selectRecharge(500, 80)">¥500 送¥80</div>
                <div class="recharge-package" data-amount="1000" onclick="selectRecharge(1000, 200)">¥1000 送¥200</div>
                <input type="number" id="customRecharge" placeholder="自定义金额">
                <button class="btn btn-primary" onclick="confirmRecharge()">确认充值</button>
            </div>
        </div>
    </div>
    
    <!-- 新增会员模态框 -->
    <div class="modal" id="addMemberModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新增会员</h3>
                <button class="close-btn" onclick="closeModal('addMemberModal')">&times;</button>
            </div>
            <input type="text" id="newMemberName" placeholder="姓名">
            <input type="tel" id="newMemberPhone" placeholder="手机号">
            <input type="number" id="newMemberBalance" placeholder="初始余额(可选)">
            <button class="btn btn-primary" onclick="saveMember()">保存</button>
        </div>
    </div>

<script>
// 数据管理
const dataManager = {
    getData: function() {
        const saved = localStorage.getItem('nailData');
        if (saved) return JSON.parse(saved);
        return {
            today: { orders: 0, income: 0, recharge: 0 },
            members: [],
            orders: []
        };
    },
    saveData: function(data) {
        localStorage.setItem('nailData', JSON.stringify(data));
    },
    addOrder: function(amount, services) {
        const data = this.getData();
        data.today.orders++;
        data.today.income += amount;
        data.orders.unshift({
            id: Date.now(),
            amount: amount,
            services: services,
            time: new Date().toLocaleString()
        });
        this.saveData(data);
        return data;
    },
    addMember: function(name, phone, balance) {
        const data = this.getData();
        if (data.members.find(m => m.phone === phone)) {
            alert('该手机号已存在');
            return null;
        }
        const member = { id: Date.now(), name, phone, balance: balance || 0 };
        data.members.push(member);
        this.saveData(data);
        return member;
    },
    findMember: function(phone) {
        return this.getData().members.find(m => m.phone === phone);
    },
    rechargeMember: function(phone, amount, bonus) {
        const data = this.getData();
        const member = data.members.find(m => m.phone === phone);
        if (member) {
            member.balance += amount + bonus;
            data.today.recharge += amount;
            this.saveData(data);
        }
        return member;
    }
};

// 服务列表
const services = [
    { name: '纯色美甲', price: 101 },
    { name: '款式本甲', price: 189 },
    { name: '猫眼美甲', price: 159 },
    { name: '美睫任意款', price: 159 },
    { name: '甲片款式', price: 279 },
    { name: '热门简约款', price: 149 },
    { name: '脚部美甲', price: 159 },
    { name: '下睫毛', price: 55 }
];

let selectedServices = [];
let currentMember = null;
let rechargeAmount = 0;
let rechargeBonus = 0;

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    updateStats();
    initNav();
    initButtons();
});

function initNav() {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            const tab = this.dataset.tab;
            showPage(tab);
        });
    });
}

function initButtons() {
    // 快速开单
    document.getElementById('quickOrderBtn').addEventListener('click', function() {
        selectedServices = [];
        renderServices();
        document.getElementById('orderTotal').textContent = '¥0';
        showModal('quickOrderModal');
    });
    
    // 收款
    document.getElementById('collectMoneyBtn').addEventListener('click', function() {
        const total = selectedServices.reduce((sum, s) => sum + s.price, 0);
        if (total === 0) {
            alert('请先选择服务');
            return;
        }
        document.getElementById('collectAmount').textContent = '¥' + total;
        showModal('collectMoneyModal');
    });
    
    // 会员充值
    document.getElementById('memberRechargeBtn').addEventListener('click', function() {
        document.getElementById('searchPhone').value = '';
        document.getElementById('memberInfo').style.display = 'none';
        showModal('memberRechargeModal');
    });
    
    // 会员管理
    document.getElementById('memberManageBtn').addEventListener('click', function() {
        showPage('members');
        loadMembers();
    });
    
    // 新增会员按钮
    document.getElementById('addMemberBtn').addEventListener('click', function() {
        document.getElementById('newMemberName').value = '';
        document.getElementById('newMemberPhone').value = '';
        document.getElementById('newMemberBalance').value = '';
        showModal('addMemberModal');
    });
}

function showPage(page) {
    document.querySelectorAll('.container, .page-content').forEach(el => {
        el.classList.remove('active');
        el.style.display = 'none';
    });
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    
    if (page === 'home') {
        document.getElementById('homePage').style.display = 'flex';
        document.querySelector('.nav-item[data-tab="home"]').classList.add('active');
    } else {
        document.getElementById(page + 'Page').classList.add('active');
        document.getElementById(page + 'Page').style.display = 'block';
        document.querySelector('.nav-item[data-tab="' + page + '"]').classList.add('active');
    }
}

function showModal(id) {
    document.getElementById(id).style.display = 'flex';
}

function closeModal(id) {
    document.getElementById(id).style.display = 'none';
}

function renderServices() {
    const list = document.getElementById('serviceList');
    list.innerHTML = '';
    services.forEach(service => {
        const div = document.createElement('div');
        div.className = 'service-item';
        div.innerHTML = '<span>' + service.name + '</span><span>¥' + service.price + '</span>';
        div.onclick = function() {
            toggleService(service, this);
        };
        list.appendChild(div);
    });
}

function toggleService(service, el) {
    const idx = selectedServices.findIndex(s => s.name === service.name);
    if (idx === -1) {
        selectedServices.push(service);
        el.classList.add('selected');
    } else {
        selectedServices.splice(idx, 1);
        el.classList.remove('selected');
    }
    updateTotal();
}

function updateTotal() {
    const total = selectedServices.reduce((sum, s) => sum + s.price, 0);
    document.getElementById('orderTotal').textContent = '¥' + total;
}

function clearSelection() {
    selectedServices = [];
    renderServices();
    document.getElementById('orderTotal').textContent = '¥0';
}

function confirmOrder() {
    if (selectedServices.length === 0) {
        alert('请选择服务');
        return;
    }
    closeModal('quickOrderModal');
    document.getElementById('collectAmount').textContent = '¥' + selectedServices.reduce((sum, s) => sum + s.price, 0);
    showModal('collectMoneyModal');
}

function processPayment(method) {
    const total = selectedServices.reduce((sum, s) => sum + s.price, 0);
    dataManager.addOrder(total, selectedServices.map(s => s.name).join('+'));
    closeModal('collectMoneyModal');
    selectedServices = [];
    updateStats();
    alert('支付成功: ¥' + total);
}

function searchMember() {
    const phone = document.getElementById('searchPhone').value;
    const member = dataManager.findMember(phone);
    if (member) {
        currentMember = member;
        document.getElementById('memberName').textContent = member.name;
        document.getElementById('memberBalance').textContent = member.balance;
        document.getElementById('memberInfo').style.display = 'block';
    } else {
        alert('未找到会员');
    }
}

function selectRecharge(amount, bonus) {
    rechargeAmount = amount;
    rechargeBonus = bonus;
    document.querySelectorAll('.recharge-package').forEach(el => el.classList.remove('selected'));
    event.target.classList.add('selected');
}

function confirmRecharge() {
    if (!currentMember) {
        alert('请先搜索会员');
        return;
    }
    const custom = parseInt(document.getElementById('customRecharge').value) || 0;
    if (custom > 0) {
        rechargeAmount = custom;
        rechargeBonus = Math.floor(custom * 0.2);
    }
    if (rechargeAmount === 0) {
        alert('请选择或输入充值金额');
        return;
    }
    dataManager.rechargeMember(currentMember.phone, rechargeAmount, rechargeBonus);
    closeModal('memberRechargeModal');
    updateStats();
    alert('充值成功');
}

function saveMember() {
    const name = document.getElementById('newMemberName').value;
    const phone = document.getElementById('newMemberPhone').value;
    const balance = parseInt(document.getElementById('newMemberBalance').value) || 0;
    if (!name || !phone) {
        alert('请填写姓名和手机号');
        return;
    }
    const member = dataManager.addMember(name, phone, balance);
    if (member) {
        closeModal('addMemberModal');
        loadMembers();
        alert('会员添加成功');
    }
}

function loadMembers() {
    const data = dataManager.getData();
    const list = document.getElementById('memberList');
    list.innerHTML = '';
    data.members.forEach(m => {
        const div = document.createElement('div');
        div.className = 'service-item';
        div.innerHTML = '<span>' + m.name + ' (' + m.phone + ')</span><span>¥' + m.balance + '</span>';
        list.appendChild(div);
    });
}

function updateStats() {
    const data = dataManager.getData();
    document.getElementById('todayOrders').textContent = data.today.orders;
    document.getElementById('todayIncome').textContent = '¥' + data.today.income;
    document.getElementById('todayRecharge').textContent = '¥' + data.today.recharge;
}
</script>
</body>
</html>
