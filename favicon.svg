<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#F8D7E3"/>
  <!-- Nail bottle body -->
  <rect x="24" y="30" width="16" height="24" rx="3" fill="#F2A8C2"/>
  <!-- Nail bottle cap -->
  <rect x="27" y="16" width="10" height="16" rx="2" fill="#E893B1"/>
  <!-- Bottle highlight -->
  <rect x="26" y="34" width="4" height="8" rx="1" fill="#fff" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="20" cy="22" r="3" fill="#FFB6C1"/>
  <circle cx="44" cy="22" r="3" fill="#FFB6C1"/>
  <circle cx="18" cy="36" r="2" fill="#FFB6C1"/>
  <circle cx="46" cy="36" r="2" fill="#FFB6C1"/>
  <!-- Star decoration -->
  <text x="32" y="50" font-size="12" text-anchor="middle" fill="#fff">✦</text>
</svg>
